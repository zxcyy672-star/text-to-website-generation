                        <style>
                          body {
                            margin: 0;
                            font-family: 'Verdana', sans-serif;
                            background-color: White;
                            color: #222;
                            transition: background 0.3s, color 0.3s;
                          }
                          header {
                            background-color: DarkSlateGray;
                            color: white;
                            text-align: center;
                            padding: 20px;
                            position: relative;
                          }
                          nav {
                            background-color: #2F4F4F;
                            display: flex;
                            justify-content: center;

                            padding: 10px;
                          }
                          nav a {

                            font-weight: bold;
                          }

                          }
                         .section {
                            padding: 40px 20px;
                          }
                         .section-light {
                            background: LightGray;
                          }
                         .grid {
                            display: grid;
                            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                            gap: 20px;
                          }
                         .card {
                            background: white;
                            padding: 15px;
                            border-radius: 8px;
                            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
                            text-align: center;
                            display: flex;
                            flex-direction: column;

                          }

                          }

                            padding: 10px;
                            margin: 5px;
                            width: 250px;
                            max-width: 90%;
                          }
                         .newsletter button {
                            padding: 10px 20px;
                            margin: 5px;
                            background-color: Gold;
                            color: black;
                            border: none;
                            border-radius: 5px;
                            cursor: pointer;
                          }
                          footer {
                            text-align: center;
                            padding: 20px;
                            background: #2F4F4F;
                            color: white;
                          }

                            }

                            }
                           .grid {
                              grid-template-columns: 1fr;
                            }
                           .card {
                              padding: 10px;
                            }

                              margin-bottom: 8px;
                            }
